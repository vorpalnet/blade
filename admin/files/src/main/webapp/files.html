<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>BLADE Files — Editor</title>
	<link rel="stylesheet" href="/blade/portal/brand/brand.css">
	<link rel="stylesheet" href="files.css">
	<link rel="icon" type="image/svg+xml" href="/blade/files/favicon.svg">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/ace.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-xml.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-json.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-properties.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-text.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/theme-eclipse.js"></script>
</head>
<body>
<div class="vorpal-app">

	<header class="vorpal-topbar">
		<a class="vorpal-brand" href="/blade/portal/" title="Return to portal.">
			<img class="vorpal-brand-mark" src="/blade/portal/brand/vorpal_splotch.svg" alt="Vorpal">
			<span class="vorpal-brand-text">
				<span class="vorpal-brand-product">BLADE Files</span>
				<span class="vorpal-brand-tagline">Domain File Editor</span>
			</span>
		</a>
		<nav class="vorpal-nav" aria-label="Primary">
			<a href="index.html">Overview</a>
			<a href="files.html" class="vorpal-active">Editor</a>
			<a href="docs/index.html">Documentation</a>
		</nav>
		<div class="vorpal-topbar-right">
			<span id="status" class="vorpal-pill">Loading…</span>
		</div>
	</header>

	<main class="vorpal-main">
		<div class="files-toolbar">
			<label for="file-select">File</label>
			<select id="file-select" aria-label="File to edit"></select>
			<span id="file-meta" class="files-meta"></span>
			<span class="files-spacer"></span>
			<select id="version-select" aria-label="Backup versions" title="Restore a previous version"></select>
			<button id="restore-btn" type="button" disabled>Restore</button>
			<button id="reload-btn" type="button">Reload</button>
			<button id="save-btn" type="button" class="files-primary" disabled>Save</button>
		</div>

		<div id="message" class="files-message" role="status" hidden></div>

		<div id="editor" class="files-editor"></div>
	</main>

</div>
<script src="files.js"></script>
</body>
</html>
