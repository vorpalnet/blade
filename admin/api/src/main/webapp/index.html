<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>BLADE API Explorer</title>
	<link rel="stylesheet" href="/blade/portal/brand/brand.css">
	<link rel="stylesheet" href="assets/api.css">
	<link rel="icon" type="image/svg+xml" href="/blade/api/favicon.svg">
</head>
<body class="vorpal-glass">
<div class="vorpal-app">

	<!-- Thin chrome: brand (back to portal) + service pulldown + logout.
	     Scalar renders its own full reference UI in #scalar below. -->
	<header class="vorpal-topbar">
		<a class="vorpal-brand" href="/blade/portal/" title="Return to portal.">
			<img class="vorpal-brand-mark" src="/blade/portal/brand/vorpal_splotch.svg" alt="Vorpal">
			<span class="vorpal-brand-text">
				<span class="vorpal-brand-product">BLADE Admin Portal</span>
				<span class="vorpal-brand-tagline">Unified Administration</span>
			</span>
		</a>
		<a class="vorpal-appmark" href="/blade/api/">API</a>

		<div class="vorpal-nav api-picker">
			<label for="svc-select">Service</label>
			<select id="svc-select" aria-label="Select a service" disabled>
				<option>Loading…</option>
			</select>
		</div>

		<div class="vorpal-topbar-right">
			<a class="vorpal-topbar-link" href="logout" title="Sign out">Logout</a>
		</div>
	</header>

	<main class="api-main">
		<!-- Shown when discovery fails, returns nothing, or ?app is unknown. -->
		<div id="api-notice" class="vorpal-callout vorpal-callout-note" hidden></div>

		<!-- Scalar mounts here. -->
		<div id="scalar"></div>
	</main>

</div>

<script src="assets/scalar/standalone.js"></script>
<script src="assets/api.js"></script>
</body>
</html>
