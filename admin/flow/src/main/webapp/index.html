<html>
<head>
	<title>BLADE Flow Editor</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
<link rel="stylesheet" href="./css/jquery-ui.modified.css">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css"
	integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous">


<script src="./js/flowTasks.js" defer></script>





	<style type="text/css" media="screen">
		div.base {
			position: absolute;
			overflow: hidden;
			font-family: Arial;
			font-size: 8pt;
		}
		div.base#graph {
			border-style: solid;
			border-color: #F2F2F2;
			border-width: 1px;
			background: url('images/grid.gif');
		}
		/* View filter panel inside the Tasks window */
		.view-panel {
			padding: 6px 8px 8px 8px;
			font-family: Arial;
			font-size: 12px;
		}
		.view-panel .view-header {
			margin-bottom: 4px;
		}
		.view-panel .view-header a {
			font-size: 11px;
			color: #4679B6;
			text-decoration: none;
		}
		.view-panel .view-header a:hover {
			text-decoration: underline;
		}
		.view-panel .view-item {
			display: block;
			font-weight: normal;
			padding: 2px 0;
			cursor: pointer;
		}
		.view-panel .view-item input {
			margin-right: 6px;
			vertical-align: middle;
		}
		.view-panel .view-empty {
			color: #888;
			font-style: italic;
			font-size: 11px;
		}
		hr.view-sep {
			border: none;
			border-top: 1px solid #ccc;
			margin: 4px 0 6px 0;
		}
	</style>
	<script type="text/javascript">
		// Disable mxResources auto-load. The resource files (app.txt,
		// editor.txt, graph.txt) are not reachable in this deployed
		// environment and the 404s clutter the console. Tooltips are
		// applied manually via flowUtils.applyToolbarTooltips().
		var mxLoadResources = false;
	</script>


	<script type="text/javascript" src="js/mxClient.js"></script>
	<script type="text/javascript" src="js/app.js"></script>
	<script type="text/javascript" src="js/flowUtils.js"></script>
	<script type="text/javascript" src="js/flowFsmar.js"></script>
	
	
	<script type="text/javascript">
	
		mxGraph.prototype.htmlLabels = true;
	
		mxGraph.prototype.isWrapping = function(cell)
		{
			return true;
		};
		
		mxConstants.DEFAULT_HOTSPOT = 1;
		
		// Enables guides
		mxGraphHandler.prototype.guidesEnabled = true;
		
	    // Alt disables guides
	    mxGuide.prototype.isEnabledForEvent = function(evt)
	    {
	    	return !mxEvent.isAltDown(evt);
	    };
		
		// Enables snapping waypoints to terminals
		mxEdgeHandler.prototype.snapToTerminals = true;
		
		window.onbeforeunload = function() { return mxResources.get('changesLost'); };
	</script>
	
	
	
</head>
<body onload="createEditor('config/workfloweditor.xml');">
	<table id="splash" width="100%" height="100%"
		style="background:white;position:absolute;top:0px;left:0px;z-index:4;">
		<tr>
			<td align="center" valign="middle">
				<img src="images/loading.gif">
			</td>
		</tr>
	</table>
	<div id="graph" class="base">
		<!-- Graph Here -->
	</div>
	<div id="status" class="base" align="right" style="white-space:nowrap;">
		<!-- Status Here -->
	</div>
	
	<script>
	
		// Loads the stencils into the registry
  		var req = mxUtils.load('./stencils/microservices.xml');
   		var root = req.getDocumentElement();
   		var shape = root.firstChild;

   		while (shape != null){
      		if (shape.nodeType == mxConstants.NODETYPE_ELEMENT){
         		mxStencilRegistry.addStencil(shape.getAttribute('name'), new mxStencil(shape));
      		}         
   			shape = shape.nextSibling;
		}
				
		
	</script>
	
	
	
	
</body>
</html>
