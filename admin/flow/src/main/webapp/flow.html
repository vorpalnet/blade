	<!-- Property-panel styles. The panels are fragment-loaded into THIS
	     document, so their styles must be linked here — head styles in the

	<!-- Embed mode (?embed=1): no-op for now; brand topbar stays visible
	     so navigation parity (Overview / Editor / Documentation) is
	     preserved whether the user reaches the app via the portal or
	     directly. The body.embedded class is still added so future
	     embed-specific tweaks can hook off it. -->
	<script>
		if (new URLSearchParams(location.search).get('embed') === '1') {
			document.addEventListener('DOMContentLoaded', () => document.body.classList.add('embedded'));
		}
	</script>

<!-- Self-hosted — no CDN dependencies. Customer admin networks are often
     air-gapped; everything the editor needs ships in the WAR.
     See js/THIRD-PARTY.md for vendored-library provenance. -->
<script src="./js/vendor/jquery-3.7.1.min.js"></script>

<script src="./js/flowTasks.js" defer></script>

	<script type="text/javascript">
		// Disable mxResources auto-load. The resource files (app.txt,
		// editor.txt, graph.txt) are not reachable in this deployed
		// environment and the 404s clutter the console. Tooltips are
		// applied manually via flowUtils.applyToolbarTooltips().
		var mxLoadResources = false;
	</script>


	<script type="text/javascript" src="js/mxClient.js"></script>
	<script type="text/javascript">
		// Cache-busting for the editor config + stencils. Every *.xml the editor
		// pulls — the toolbar/graph/editor config includes AND the stencil set —
		// is fetched through mxUtils.load (config includes via
		// mxObjectCodec.processInclude). Appending the build id makes a redeploy
		// fetch fresh copies instead of serving a stale cached XML (the "cache
		// dance"). The id is constant within a build, so caching still works
		// between reloads and only busts when a new build is deployed.
		// ${buildTimestamp} is filtered in at build time; running straight
		// from unfiltered source falls back to a constant (fine for dev).
		(function() {
			var build = '${buildTimestamp}'.replace(/[^0-9A-Za-z]/g, '') || 'dev';
			var origLoad = mxUtils.load;
			mxUtils.load = function(url) {
				if (typeof url === 'string' && /\.xml(\?|$)/i.test(url)
						&& url.indexOf('v=' + build) === -1) {
					url += (url.indexOf('?') === -1 ? '?' : '&') + 'v=' + build;
				}
				arguments[0] = url;
				return origLoad.apply(this, arguments);
			};
		})();
	</script>
	<script type="text/javascript" src="js/app.js"></script>
	<script type="text/javascript" src="js/flowSession.js"></script>
	<script type="text/javascript" src="js/flowUtils.js"></script>
	<script type="text/javascript" src="js/flowPlans.js"></script>
	<script type="text/javascript" src="js/flowFsmar.js"></script>
	<script type="text/javascript" src="js/flowSimulate.js"></script>
	
	
	<script type="text/javascript">
	
		mxGraph.prototype.htmlLabels = true;
	
		mxGraph.prototype.isWrapping = function(cell)
		{
			return true;
		};
		
		mxConstants.DEFAULT_HOTSPOT = 1;
		
		// Enables guides
		mxGraphHandler.prototype.guidesEnabled = true;
		
	    // Alt disables guides
	    mxGuide.prototype.isEnabledForEvent = function(evt)
	    {
	    	return !mxEvent.isAltDown(evt);
	    };
		
		// Enables snapping waypoints to terminals
		mxEdgeHandler.prototype.snapToTerminals = true;
		
		window.onbeforeunload = function() { return mxResources.get('changesLost'); };
	</script>
	
	
	
</head>
<body onload="createEditor('config/workfloweditor.xml');">
	<table id="splash" width="100%" height="100%"
		style="background:white;position:absolute;top:0px;left:0px;z-index:4;">
		<tr>
			<td align="center" valign="middle">
				<img src="images/loading.gif">
			</td>
		</tr>
	</table>
	<div id="graph" class="base">
		<!-- Graph Here -->
	</div>
	<div id="status" class="base" align="right" style="white-space:nowrap;">
		<!-- Status Here -->
	</div>
	
	<script>
	
		// Loads the stencils into the registry
  		var req = mxUtils.load('./stencils/microservices.xml');
   		var root = req.getDocumentElement();
   		var shape = root.firstChild;

   		while (shape != null){
      		if (shape.nodeType == mxConstants.NODETYPE_ELEMENT){
         		mxStencilRegistry.addStencil(shape.getAttribute('name'), new mxStencil(shape));
      		}         
   			shape = shape.nextSibling;
		}
				
		
	</script>
	
	
	
	
</body>
</html>
