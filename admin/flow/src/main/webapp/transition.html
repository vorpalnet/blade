<html>
<head>
<title>Transition Properties</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<style>
body {
	font-family: Arial;
	font-size: 12px;
	background-color: #eef;
}
#transition-view {
	padding: 4px;
}
#transition-tabs {
	font-size: 12px;
}
#transition-view > #transition-tabs > div > label {
	display: block;
	margin-top: 6px;
	font-weight: bold;
}
#transition-view input[type=text],
#transition-view select {
	padding: 3px;
	box-sizing: border-box;
}
#transition-view > #transition-tabs > div > input[type=text],
#transition-view > #transition-tabs > div > select {
	width: 100%;
}
#transition-view fieldset {
	margin: 10px 0;
	border: 1px solid #bbb;
	padding: 6px 10px 12px 10px;
	background: #f8f8ff;
	border-radius: 4px;
}
#transition-view legend {
	font-weight: bold;
	font-size: 11px;
	padding: 0 6px;
}
.selector-row legend .remove-btn {
	cursor: pointer;
	color: #c00;
	margin-left: 6px;
}
/* Each selector field stacks vertically with breathing room */
.sel-field {
	margin-top: 10px;
}
.sel-field label {
	display: block;
	font-weight: bold;
	font-size: 11px;
	margin-bottom: 3px;
	color: #444;
}
.sel-field input[type=text],
.sel-field select {
	width: 100%;
}
.route-row {
	border: 1px dashed #aaa;
	padding: 4px;
	margin-top: 4px;
	background: #f8f8ff;
	display: flex;
	gap: 4px;
	align-items: center;
}
.route-row input {
	flex: 1;
}
.extract-row {
	display: flex;
	gap: 4px;
	align-items: center;
	margin-top: 4px;
}
.extract-row .ex-name {
	flex: 1;
	min-width: 0;
}
.extract-row .ex-path {
	flex: 2;
	min-width: 0;
}
.group-row {
	margin: 8px 0;
	border: 2px solid #88a;
	padding: 6px 8px 10px 8px;
	background: #f4f4ff;
	border-radius: 6px;
}
.group-row > legend {
	font-weight: bold;
	font-size: 12px;
	padding: 0 6px;
	color: #446;
}
.or-divider {
	text-align: center;
	font-weight: bold;
	font-size: 11px;
	color: #888;
	margin: 2px 0;
}
.add-btn {
	color: green;
	cursor: pointer;
	font-size: 14px;
}
.remove-btn {
	color: #c00;
	cursor: pointer;
}
.hint {
	color: #666;
	font-size: 10px;
	font-style: italic;
}
</style>
</head>
<body>

<div id="transition-view">

	<div id="transition-tabs">
		<ul>
			<li><a href="#transition-tabs-basic">Basic</a></li>
			<li><a href="#transition-tabs-selectors">Selectors</a></li>
			<li><a href="#transition-tabs-routing">Routing</a></li>
		</ul>

		<div id="transition-tabs-basic">
			<label>SIP Method</label>
			<select id="transition-method">
				<option>INVITE</option>
				<option>REGISTER</option>
				<option>SUBSCRIBE</option>
				<option>OPTIONS</option>
				<option>MESSAGE</option>
				<option>PUBLISH</option>
				<option>REFER</option>
				<option>NOTIFY</option>
			</select>

			<label>Transition ID <span class="hint">(for logging)</span></label>
			<input id="transition-txid" type="text" placeholder="e.g. INV-1" />

			<label>Next Application <span class="hint">(edge target — read-only)</span></label>
			<input id="transition-next" type="text" readonly />
		</div>

		<div id="transition-tabs-selectors">
			<div style="margin-bottom: 4px;">
				<i class="fas fa-plus-circle add-btn" id="add-group" title="Add selector group"></i>
				<span class="hint">First matching group wins (OR)</span>
			</div>
			<div id="transition-groups"></div>
		</div>

		<div id="transition-tabs-routing">
			<label>Subscriber Header <span class="hint">(e.g. From, To)</span></label>
			<input id="transition-subscriber" type="text" placeholder="From" />

			<label>Route URIs</label>
			<div style="margin-bottom: 4px;">
				<i class="fas fa-plus-circle add-btn" id="add-route" title="Add route"></i>
				<span class="hint">Pushed as Route headers</span>
			</div>
			<div id="transition-routes"></div>
		</div>

	</div>
</div>

</body>
</html>
