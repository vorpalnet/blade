<html>
<head>
<title>Transition Properties</title>
	<link rel="stylesheet" href="/blade/portal/brand/brand.css">
	<link rel="stylesheet" href="css/panels.css">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

</head>
<body>

<div id="transition-view">

	<div id="transition-tabs">
		<div class="tab-strip">
			<button type="button" class="tab-btn tab-active" data-tab="transition-tabs-basic">Basic</button>
			<button type="button" class="tab-btn" data-tab="transition-tabs-routing">Routing</button>
		</div>

		<div id="transition-tabs-basic" class="tab-page tab-active">
			<label>SIP Method</label>
			<select id="transition-method">
				<option>INVITE</option>
				<option>REGISTER</option>
				<option>SUBSCRIBE</option>
				<option>OPTIONS</option>
				<option>MESSAGE</option>
				<option>PUBLISH</option>
				<option>REFER</option>
				<option>NOTIFY</option>
			</select>

			<label>When <span class="hint">(condition over extracted values; empty = always matches)</span></label>
			<textarea id="transition-when" placeholder="${To.user} == 'bob' &amp;&amp; ${tier} == 'gold'"></textarea>

			<label>Evaluation Order <span class="hint">(within same state+method; lower runs first — first match wins)</span></label>
			<input id="transition-seq" type="number" min="0" step="1" />

			<label>Transition ID <span class="hint">(for logging)</span></label>
			<input id="transition-txid" type="text" placeholder="e.g. INV-1" />

			<label>Next Application <span class="hint">(edge target — read-only)</span></label>
			<input id="transition-next" type="text" readonly />
		</div>

		<div id="transition-tabs-routing" class="tab-page">
			<label>Subscriber Header <span class="hint">(e.g. From, To)</span></label>
			<input id="transition-subscriber" type="text" placeholder="From" />

			<label>Region <span class="hint">(JSR-289 routing region; blank = NEUTRAL)</span></label>
			<select id="transition-region">
				<option value=""></option>
				<option>ORIGINATING</option>
				<option>TERMINATING</option>
				<option>NEUTRAL</option>
			</select>

			<!-- Egress note: shown when this transition targets an egress node.
			     Routes for the exit live on the egress node, not here. -->
			<div id="transition-egress-note" class="state-hint" style="display:none;">
				This transition exits to an <b>egress</b> node &mdash; its route URIs
				and modifier are set on the egress node itself (select it to edit).
			</div>

			<!-- Route URIs + modifier. Routes are pointless on app-to-app hops
			     (the next app routes itself) and belong at the egress, so this
			     section is hidden unless the transition already carries routes. -->
			<div id="transition-routes-section">
				<label>Route URIs</label>
				<div style="margin-bottom: 4px;">
					<svg class="add-btn" id="add-route" title="Add route" viewBox="0 0 16 16" width="14" height="14"><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 4.5v7M4.5 8h7" stroke="currentColor" stroke-width="1.5"/></svg>
					<span class="hint">Pushed as Route headers; ${} placeholders resolve against the context</span>
				</div>
				<div id="transition-routes"></div>

				<label>Route Modifier <span class="hint">(how routes are applied; blank = ROUTE)</span></label>
				<select id="transition-route-modifier">
					<option value=""></option>
					<option>ROUTE</option>
					<option>ROUTE_BACK</option>
					<option>ROUTE_FINAL</option>
					<option>NO_ROUTE</option>
				</select>
			</div>
		</div>

	</div>
</div>

</body>
</html>
