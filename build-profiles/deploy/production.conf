# BLADE deployment profile — production
#
# The single source of truth for WHERE to deploy and which pre-built artifacts
# to use. One command drives it all:
#
#   ./deploy.sh production                 # whole environment, in order
#   ./deploy.sh production services         # just one tier (no target needed)
#
# Passwords live in production.secret (gitignored) — see production.secret.example.

# --- Which build to deploy ---
# Build profile that produced the dist/ directory (full|production|minimal).
# deploy.sh uses the newest dist/<ver>-<build>/ unless you pass --build VER.
build.profile=production

# --- WebLogic connection ---
wls.adminurl=t3://occas-prod-01.example.com:7001
wls.user=weblogic
# wls.password is loaded from production.secret (see production.secret.example)

# --- Deployment targets (WebLogic target names) ---
# deploy.sh derives the target per tier from these — you never pass it on the CLI.
wls.targets.admin=AdminServer
# Cluster-only — the engine tier where service WARs run.
wls.targets.cluster=engine-cluster
# Shared library — must be targeted to BOTH (admin apps and services reference it).
wls.targets.both=AdminServer,engine-cluster

# --- WebLogic Maven plugin version (optional) ---
# The deploy uses com.oracle.weblogic:weblogic-maven-plugin:<version>. By default
# deploy.sh derives <version> from the platform conf stamped into the dist/ dir
# being deployed (OCCAS 8.1 → 14.1.1, OCCAS 8.2/8.3 → 14.1.2). Set this only to
# override that — e.g. the installed plugin coordinate differs from the server's.
# wls.plugin.version=14.1.2

# --- FSMAR install destination (the 'fsmar' tier) ---
# blade-fsmar.jar is NOT a WebLogic deployment — it's a fat JAR copied into each
# engine node's OCCAS approuter/ directory and loaded by the App Router at boot.
# List every engine-tier host; deploy.sh scp's the jar to each node's
# approuter.dir (approuter.dir + ssh.user are uniform across the cluster).
# After copy, the engine tier must be RESTARTED for changes to take effect.
#
# This is an operator-time PUSH — separate from (and complementary to) the
# restart-time rsync-pull described in the cluster-file-sync design.
ssh.user=oracle
approuter.dir=/u01/oracle/user_projects/domains/blade_domain/approuter
engine.nodes=occas-eng-01.example.com,occas-eng-02.example.com
# Back-compat: if engine.nodes is empty, deploy.sh falls back to a single
# ssh.host (scp), or to a local cp into approuter.dir if neither is set.
# ssh.host=occas-prod-01.example.com

# --- Which service WARs to deploy (the 'services' tier) ---
# Empty or '*' = deploy every service WAR the build produced. Otherwise a CSV of
# app names (the WAR basename / context-root) restricts the deploy to those.
# Admin ships as one EAR (blade-admin.ear) — it's all-or-nothing, no allowlist.
deploy.services=*
# e.g.  deploy.services=hold,irouter,proxy-router
