# BLADE deployment profile — OCI (Oracle Cloud), driven FROM the AdminServer
#
# This env assumes you run ./deploy.sh ON the AdminServer node of the OCI
# cluster, so WebLogic is reachable at localhost and the engine nodes are
# reachable over SSH (key-based, user 'oracle').
#
#   ./deploy.sh oci                 # whole environment, in order
#   ./deploy.sh oci services        # just one tier
#   ./deploy.sh oci --dry-run       # print what would happen, run nothing
#
# Passwords live in oci.secret (gitignored) — copy production.secret.example
# to oci.secret, or export BLADE_WLS_PASSWORD.
#
# >>> EDIT the three placeholders marked TODO before first use. <<<

# --- Which build to deploy ---
build.profile=production

# --- WebLogic connection ---
# Running on the AdminServer itself: localhost dodges DNS / hostname / firewall.
wls.adminurl=t3://localhost:7001
wls.user=weblogic
# wls.password is loaded from oci.secret (see production.secret.example)

# --- Deployment targets (WebLogic target names) ---
# These are WebLogic *target* names, not hostnames. AdminServer is standard;
# confirm the SIP engine cluster's configured name in the WLS console.
wls.targets.admin=AdminServer
# TODO: confirm the SIP engine cluster's configured name in OCI.
wls.targets.cluster=engine-cluster
wls.targets.both=AdminServer,engine-cluster

# --- WebLogic Maven plugin version (optional) ---
# Left to auto-derive: deploy.sh reads weblogic.version (14.1.2 for OCCAS 8.3)
# from the platform conf stamped into the dist/ dir. Uncomment only to override.
# wls.plugin.version=14.1.2

# --- FSMAR install destination (the 'fsmar' tier) ---
# blade-fsmar.jar is scp'd to each engine node's approuter/ dir (key-based SSH,
# no password). The engine tier must be RESTARTED for changes to take effect.
ssh.user=oracle
# TODO: confirm the OCCAS domain path on the engine nodes (approuter/ under it).
# systemd units suggest /opt/oracle/occas/8.3/user_projects/domains/<domain>.
approuter.dir=/opt/oracle/occas/8.3/user_projects/domains/replicated/approuter
# Internal VCN names, resolvable from the AdminServer (ping engine1/engine2 OK).
engine.nodes=engine1,engine2

# --- Which service WARs to deploy (the 'services' tier) ---
deploy.services=*

# ============================================================================
# TLS / certificates — used by tls/make-certs.sh and tls/install-ssl.sh.
# (Passphrases live in oci.secret, NOT here. See production.secret.example.)
# ============================================================================

# SAN list for the one shared identity cert. keytool form: dns:host / ip:addr.
# Covers short names, internal FQDNs, both IP planes, and localhost so the same
# cert satisfies hostname verification however a client connects.
tls.san=dns:admin,dns:admin.sub12242250360.vcn1.oraclevcn.com,ip:10.0.0.10,ip:159.54.187.229,dns:engine1,dns:engine1.sub12242250360.vcn1.oraclevcn.com,ip:10.0.0.26,ip:159.54.174.66,dns:engine2,dns:engine2.sub12242250360.vcn1.oraclevcn.com,ip:10.0.0.130,ip:64.181.229.129,dns:localhost,ip:127.0.0.1
tls.ca.cn=BLADE Internal CA
tls.identity.cn=admin.sub12242250360.vcn1.oraclevcn.com
tls.identity.alias=blade-identity
tls.validity.days=825
tls.key.size=2048

# Absolute dir, IDENTICAL on every node, where the p12 keystores are installed.
# Must exist (install-ssl.sh creates it) and be readable by the 'oracle' user.
# TODO: confirm this path suits your domain layout.
tls.keystore.dir=/opt/oracle/occas/8.3/security

# --- Admin HTTPS + t3s (same SSL port serves both) ---
tls.ssl.port=7002
# tls.ssl.servers=AdminServer,engine1,engine2   # default: ALL servers

# --- SIP TLS (the 'sips' network channel on the engine tier) ---
sip.tls.enabled=true
sip.tls.port=5061
sip.tls.versions=TLSv1.2
# One-way TLS by default. Set true for mutual TLS to the SBC, and point
# sbc.ca.cert at the SBC's signing CA so make-certs.sh trusts it.
sip.tls.twoway=false
# sbc.ca.cert=/path/to/sbc-ca.pem
# sip.tls.servers=engine1,engine2   # default: members of wls.targets.cluster
