# Full build profile - every library, admin, service, and test module.
#
# Add modules to include in the build. Use the full project directory name.
# Anything NOT listed here is excluded via -Dskip.<name>.

# Libraries
framework
shared
fsmar
fsmar3

# Admin apps (portal ships the canonical Vorpal brand assets under
# /blade/portal/brand/ — every other admin app references them via that URL;
# redirect owns bare /blade and 302s to /blade/portal/)
portal
api
redirect
configurator
files
crud-editor
flow
tuning
logs
analytics-console
test-console
# watcher — headless config auto-publish shim, standalone WAR only (NOT in the
# admin EAR). For sites that don't deploy the Configurator UI.
watcher
# Admin EAR — bundles the admin apps above (except watcher) into
# blade-admin.ear. Contents track this conf: each app rides its own
# ear-<name> profile in admin/ear/pom.xml. javadoc.war is included exactly
# when javadocs are generated (skipped docs no longer skip the EAR).
ear

# Services
acl
analytics
context
hold
options
presence
proxy-balancer
proxy-block
proxy-registrar
proxy-router
irouter
queue
tpcc
transfer
crud
# Cluster EAR — bundles every service WAR above into blade-cluster.ear
# (mirror of the admin EAR). build.sh routes it to dist/services/.
cluster

# Test applications
test-b2bua
test-uac
test-uas
