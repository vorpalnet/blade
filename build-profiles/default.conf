# Default build profile - the modules built when no profile is specified.
#
# This now builds EVERYTHING wired into the reactor (same set as full.conf).
# Add modules to include in the build. Use the full project directory name.
# Anything NOT listed here is excluded via -Dskip.<name>.
#
# Two modules are intentionally NOT here because they aren't conf-controlled:
#   - admin/javadoc — built via the -Pjavadocs profile (parent pom), which
#     ./build.sh activates by default unless BLADE_SKIP_JAVADOC/--no-javadoc.
#   - libs/stir-spike — a standalone research spike, not wired into the reactor.

# Libraries (framework + shared are required by every WAR)
framework
shared
fsmar
fsmar3

# Admin apps (portal is the entry point + ships the canonical Vorpal brand
# assets under /blade/portal/brand/; redirect owns bare /blade and 302s to it.
# analytics-admin keys on skip.analytics-admin -> admin/analytics.)
portal
api
redirect
configurator
crud-editor
flow
tuning
watcher
logs
analytics-admin

