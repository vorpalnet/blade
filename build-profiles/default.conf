# Default build profile - the modules built when no profile is specified.
#
# This now builds EVERYTHING wired into the reactor (same set as full.conf),
# EXCEPT the proto/ incubator modules (acl, security, test-console),
# which are built/deployed by hand.
# Add modules to include in the build. Use the full project directory name.
# Anything NOT listed here is excluded via -Dskip.<name>.
#
# One module is intentionally NOT here because it isn't conf-controlled:
#   - admin/javadoc — built via the -Pjavadocs profile (parent pom), which
#     ./build.sh activates by default unless BLADE_SKIP_JAVADOC/--no-javadoc.

# Libraries (framework + shared are required by every WAR)
framework
shared
fsmar

# Admin apps (portal is the entry point + ships the canonical Vorpal brand
# assets under /blade/portal/brand/; redirect owns bare /blade and 302s to it.
# analytics-console is the admin app at /blade/analytics — distinct from the
# analytics cluster SERVICE.)
portal
api
redirect
configurator
files
crud-editor
flow
tuning
logs
analytics-console
callflow
# Admin EAR (apps/admin -> blade-admin.ear). Contents track this conf: each app
# rides its own ear-<name> profile. blade-javadoc.war is included with javadocs.
admin

# Services + the cluster EAR (apps/services -> blade-services.ear). acl is in
# proto/ now (not shipped); proxy-registrar ships only in blade-test.ear.
analytics
context
hold
options
presence
proxy-balancer
proxy-block
proxy-registrar
irouter
queue
tpcc
transfer
crud
services

# Test apps + the test EAR (apps/test -> blade-test.ear -> engine0).
test-b2bua
test-uac
test-uas
test
