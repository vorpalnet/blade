# Production build profile - admin apps + services (no test apps)
#
# Add modules to include in the build. Use the full project directory name.
# Anything NOT listed here is excluded via -Dskip.<name>.

# Libraries
framework
shared
fsmar
fsmar3

# Admin apps. The admin tier deploys as one EAR (blade-admin.ear), which
# requires every admin WAR below to be in the reactor.
portal
api
redirect
configurator
files
crud-editor
flow
tuning
logs
analytics-console
# watcher — headless config auto-publish shim, standalone WAR only (NOT in the
# admin EAR). For sites that don't deploy the Configurator UI.
watcher
# Admin EAR — bundles every admin app above except watcher (+ javadoc) into
# blade-admin.ear. build.sh auto-skips it when javadoc is skipped (the EAR
# bundles javadoc.war).
ear

# Services
acl
analytics
hold
options
presence
proxy-balancer
proxy-block
proxy-registrar
proxy-router
irouter
queue
tpcc
transfer
crud
# Cluster EAR — bundles every service WAR above into blade-cluster.ear
# (mirror of the admin EAR). build.sh routes it to dist/services/.
cluster
