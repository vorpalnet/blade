# Production build profile - admin apps + services + test apps
#
# Add modules to include in the build. Use the full project directory name.
# Anything NOT listed here is excluded via -Dskip.<name>.

# Libraries
framework
shared
fsmar
fsmar3

# Admin apps. The admin tier deploys as one EAR (blade-admin.ear) whose
# contents track this conf — drop an app here and it drops out of the EAR.
portal
api
redirect
configurator
files
crud-editor
flow
tuning
security
logs
analytics-console
# watcher — headless config auto-publish shim, standalone WAR only (NOT in the
# admin EAR). For sites that don't deploy the Configurator UI.
watcher
# Admin EAR — bundles the admin apps above (except watcher) into
# blade-admin.ear. Contents track this conf: each app rides its own
# ear-<name> profile in admin/ear/pom.xml. javadoc.war is included exactly
# when javadocs are generated (skipped docs no longer skip the EAR).
ear

# Services
acl
analytics
context
hold
options
presence
proxy-balancer
proxy-block
proxy-registrar
proxy-router
irouter
queue
tpcc
transfer
crud
# Test applications — promoted to production 2026-06-05: handy for live
# diagnostics on a customer cluster, with more features planned. Bundled
# into blade-cluster.ear like any other service.
test-b2bua
test-uac
test-uas
# Cluster EAR — bundles every service WAR above into blade-cluster.ear
# (mirror of the admin EAR). build.sh routes it to dist/services/.
cluster
